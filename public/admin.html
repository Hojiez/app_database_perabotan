<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Dashboard Management</h1>
            <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded font-bold hover:bg-red-600">Logout</button>
        </div>

        <div class="grid grid-cols-2 gap-6 mb-8">
            <div class="bg-green-500 text-white p-6 rounded-lg shadow">
                <h3 class="text-lg opacity-80">Total Pendapatan</h3>
                <p id="totalPendapatan" class="text-4xl font-bold mt-2">Rp 0</p>
            </div>
            <div class="bg-blue-500 text-white p-6 rounded-lg shadow">
                <h3 class="text-lg opacity-80">Total Transaksi</h3>
                <p id="totalTransaksi" class="text-4xl font-bold mt-2">0</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">Riwayat Transaksi Penjualan</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 border-b">
                            <th class="p-3">ID Trx</th>
                            <th class="p-3">Waktu</th>
                            <th class="p-3">Nama Perabotan</th>
                            <th class="p-3">Qty</th>
                            <th class="p-3">Total Harga</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        if(localStorage.getItem('role') !== 'management') window.location.href = '/';
        
        function logout() { localStorage.clear(); window.location.href = '/'; }

        async function loadData() {
            const resStats = await fetch('/api/stats');
            const stats = await resStats.json();
            document.getElementById('totalPendapatan').innerText = 'Rp ' + (stats.total_pendapatan || 0).toLocaleString();
            document.getElementById('totalTransaksi').innerText = stats.total_transaksi || 0;

            const resHist = await fetch('/api/history');
            const history = await resHist.json();
            const table = document.getElementById('historyTable');
            
            if (history.length === 0) {
                table.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500">Belum ada transaksi</td></tr>';
            } else {
                history.forEach(trx => {
                    const date = new Date(trx.waktu_transaksi).toLocaleString('id-ID');
                    table.innerHTML += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-3 font-mono text-sm">#${trx.id_transaksi}</td>
                            <td class="p-3 text-sm text-gray-600">${date}</td>
                            <td class="p-3 font-semibold">${trx.nama_barang}</td>
                            <td class="p-3 text-center">${trx.jumlah}</td>
                            <td class="p-3 font-bold text-green-600">Rp ${trx.total_harga.toLocaleString()}</td>
                        </tr>
                    `;
                });
            }
        }

        loadData();
    </script>
</body>
</html>
