<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kasir Panel - Toko Perabotan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #autocompleteList { max-height: 200px; overflow-y: auto; }
        .struk-kertas { background-image: radial-gradient(circle at top, transparent 4px, white 5px); background-size: 10px 10px; background-position: top; }
    </style>
</head>
<body class="bg-slate-200 p-4 md:p-8 font-sans h-screen flex flex-col">
    
    <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Sistem Kasir</h1>
        <button onclick="logout()" class="bg-red-100 text-red-600 px-4 py-2 rounded-lg font-bold hover:bg-red-200 transition">Logout</button>
    </div>

    <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
        
        <div class="lg:col-span-7 bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-xl font-bold mb-4 text-gray-700 border-b pb-2">Tambah Barang</h2>
            
            <form id="formTambah" class="space-y-4">
                <div class="relative">
                    <label class="block font-semibold mb-1 text-gray-600">Pencarian Barang</label>
                    <input type="text" id="searchBar" placeholder="Ketik nama perabotan..." class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none" autocomplete="off">
                    <div id="autocompleteList" class="absolute z-10 w-full bg-white border border-gray-200 rounded-lg shadow-xl mt-1 hidden"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-semibold mb-1 text-gray-600">Harga Satuan</label>
                        <input type="text" id="tampilHarga" class="w-full p-3 bg-gray-100 border border-gray-200 rounded-lg text-gray-500 font-semibold" readonly placeholder="Rp 0">
                    </div>
                    <div>
                        <label class="block font-semibold mb-1 text-gray-600">Jumlah</label>
                        <input type="number" id="jumlahBeli" min="1" value="1" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:outline-none" required>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-100 text-blue-700 border-2 border-blue-500 font-bold text-lg py-3 rounded-lg hover:bg-blue-600 hover:text-white transition mt-4">
                    + Tambah ke Resi
                </button>
            </form>
            <div id="statusAlert" class="mt-4 hidden p-3 rounded text-center font-semibold"></div>
        </div>

        <div class="lg:col-span-5 bg-white p-6 rounded-xl shadow-lg relative struk-kertas">
            <h2 class="text-xl font-bold mb-4 text-gray-800 text-center border-b-2 border-dashed pb-3">RESI PENJUALAN</h2>
            
            <div id="daftarKeranjang" class="min-h-[200px] mb-4 space-y-3">
                <p class="text-center text-gray-400 mt-10 italic">Resi masih kosong...</p>
            </div>

            <div class="border-t-2 border-dashed border-gray-300 pt-4 mt-auto">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-lg font-bold text-gray-600">TOTAL:</span>
                    <span id="grandTotal" class="text-2xl font-black text-green-600">Rp 0</span>
                </div>
                <button id="btnCheckout" class="w-full bg-green-500 text-white font-bold text-xl py-4 rounded-lg shadow-lg hover:bg-green-600 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    BAYAR SEKARANG
                </button>
            </div>
        </div>

    </div>

    <script>
        if(localStorage.getItem('role') !== 'kasir') window.location.href = '/';
        function logout() { localStorage.clear(); window.location.href = '/'; }

        let barangTerpilih = null; 
        let keranjang = [];        

        const searchInput = document.getElementById('searchBar');
        const autocompleteList = document.getElementById('autocompleteList');
        const tampilHarga = document.getElementById('tampilHarga');
        const jumlahInput = document.getElementById('jumlahBeli');
        const daftarKeranjang = document.getElementById('daftarKeranjang');
        const grandTotalTxt = document.getElementById('grandTotal');
        const btnCheckout = document.getElementById('btnCheckout');
        const alertBox = document.getElementById('statusAlert');

        let timer;
        searchInput.addEventListener('input', function() {
            clearTimeout(timer);
            barangTerpilih = null;
            tampilHarga.value = '';
            if (this.value.length === 0) { autocompleteList.classList.add('hidden'); return; }
            timer = setTimeout(() => searchBarang(this.value), 300);
        });

        document.addEventListener('click', (e) => {
            if (e.target !== searchInput && e.target !== autocompleteList) autocompleteList.classList.add('hidden');
        });

        async function searchBarang(query) {
            const res = await fetch(`/api/barang?search=${query}`);
            const barang = await res.json();
            autocompleteList.innerHTML = '';
            
            if (barang.length === 0) {
                autocompleteList.innerHTML = '<div class="p-3 text-gray-500 text-center">Tidak ditemukan</div>';
            } else {
                barang.forEach(b => {
                    if(b.stok <= 0) return;
                    const item = document.createElement('div');
                    item.className = 'p-3 hover:bg-blue-50 cursor-pointer border-b flex justify-between';
                    item.innerHTML = `<div><div class="font-bold">${b.nama_barang}</div><div class="text-xs text-gray-500">Stok: ${b.stok}</div></div><div class="font-semibold text-blue-600">Rp${b.harga.toLocaleString('id-ID')}</div>`;
                    
                    item.addEventListener('click', () => {
                        barangTerpilih = b; 
                        searchInput.value = b.nama_barang;
                        tampilHarga.value = `Rp ${b.harga.toLocaleString('id-ID')}`;
                        autocompleteList.classList.add('hidden');
                        jumlahInput.focus(); 
                    });
                    autocompleteList.appendChild(item);
                });
            }
            autocompleteList.classList.remove('hidden');
        }

        document.getElementById('formTambah').addEventListener('submit', (e) => {
            e.preventDefault();
            if (!barangTerpilih) {
                tampilkanPesan('Pilih barang dari daftar pencarian terlebih dahulu!', false);
                return;
            }

            const jumlah = parseInt(jumlahInput.value);
            
            const index = keranjang.findIndex(item => item.id_barang === barangTerpilih.id_barang);
            
            if (index !== -1) {
                keranjang[index].jumlah += jumlah;
                keranjang[index].subtotal = keranjang[index].jumlah * keranjang[index].harga;
            } else {
                keranjang.push({
                    id_barang: barangTerpilih.id_barang,
                    nama_barang: barangTerpilih.nama_barang,
                    harga: barangTerpilih.harga,
                    jumlah: jumlah,
                    subtotal: barangTerpilih.harga * jumlah
                });
            }

            barangTerpilih = null;
            searchInput.value = '';
            tampilHarga.value = '';
            jumlahInput.value = '1';
            searchInput.focus();

            renderKeranjang();
        });

        function renderKeranjang() {
            daftarKeranjang.innerHTML = '';
            let total = 0;

            if (keranjang.length === 0) {
                daftarKeranjang.innerHTML = '<p class="text-center text-gray-400 mt-10 italic">Resi masih kosong...</p>';
                btnCheckout.disabled = true;
            } else {
                btnCheckout.disabled = false;
                keranjang.forEach((item, index) => {
                    total += item.subtotal;
                    daftarKeranjang.innerHTML += `
                        <div class="flex justify-between items-start border-b border-gray-100 pb-2">
                            <div>
                                <div class="font-bold text-gray-800">${item.nama_barang}</div>
                                <div class="text-sm text-gray-500">${item.jumlah} x Rp${item.harga.toLocaleString('id-ID')}</div>
                            </div>
                            <div class="text-right">
                                <div class="font-bold text-gray-800">Rp${item.subtotal.toLocaleString('id-ID')}</div>
                                <button onclick="hapusItem(${index})" class="text-xs text-red-500 hover:text-red-700 underline mt-1">Hapus</button>
                            </div>
                        </div>
                    `;
                });
            }
            grandTotalTxt.innerText = `Rp ${total.toLocaleString('id-ID')}`;
        }

        window.hapusItem = function(index) {
            keranjang.splice(index, 1);
            renderKeranjang();
        }

        btnCheckout.addEventListener('click', async () => {
            btnCheckout.disabled = true;
            btnCheckout.innerText = 'MEMPROSES...';
            
            let berhasil = 0;
            
            for (const item of keranjang) {
                try {
                    const res = await fetch('/api/transaksi', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id_barang: item.id_barang, jumlah: item.jumlah })
                    });
                    
                    if(res.ok) berhasil++;
                } catch (err) {
                    console.error("Gagal memproses:", item.nama_barang);
                }
            }

            if (berhasil === keranjang.length) {
                alert(`TRANSAKSI SUKSES!\n${berhasil} jenis barang telah dibayar dan stok dipotong.`);
                keranjang = []; 
                renderKeranjang();
            } else {
                alert("Peringatan: Sebagian barang gagal diproses (mungkin stok habis di tengah transaksi).");
            }
            
            btnCheckout.innerText = 'BAYAR SEKARANG';
        });

        function tampilkanPesan(pesan, isSuccess) {
            alertBox.classList.remove('hidden', 'bg-red-100', 'text-red-700');
            alertBox.classList.add('bg-red-100', 'text-red-700');
            alertBox.innerText = pesan;
            setTimeout(() => alertBox.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
